<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App de Tarjetas</title>
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<link rel="manifest" href="manifest.json"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .swiper { width: 100%; height: 100%; }

        .swiper-slide {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10%;
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
        }

        /* Contenedor de la tarjeta */
        .card {
            max-width: 500px;
            margin: 0 auto;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #4ade80; /* Color verde llamativo */
            margin-bottom: 20px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e5e7eb;
            margin-bottom: 30px;
        }

        .materials-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #4ade80;
        }

        .materials-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .materials-text {
            font-size: 1rem;
            color: #d1d5db;
            font-style: italic;
        }

        /* Indicador visual de swipe */
        .scroll-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #4b5563;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translate(-50%, 0);}
            40% {transform: translate(-50%, -10px);}
            60% {transform: translate(-50%, -5px);}
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="cards-container">
            <!-- Cargando... -->
        </div>
        <div class="scroll-hint">Desliza hacia arriba ↑</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        async function cargarContenido() {
            const container = document.getElementById('cards-container');
            
            try {
                const response = await fetch('contenido.txt');
                const textoCompleto = await response.text();

                // Separamos por las líneas "---"
                const bloques = textoCompleto.split('---');

                container.innerHTML = '';

                bloques.forEach(bloque => {
                    if(bloque.trim() === "") return;

                    // Extraer campos usando expresiones regulares simples
                    const titulo = extraerCampo(bloque, "Título");
                    const descripcion = extraerCampo(bloque, "Descripción");
                    const materiales = extraerCampo(bloque, "Materiales");

                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    
                    slide.innerHTML = `
                        <div class="card">
                            <h1 class="title">${titulo}</h1>
                            <p class="description">${descripcion}</p>
                            <div class="materials-container">
                                <div class="materials-title">Materiales necesarios:</div>
                                <div class="materials-text">${materiales}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                initSwiper();

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="swiper-slide">Error al cargar contenido.txt</div>';
            }
        }

        // Función auxiliar para buscar el texto después de "Campo:"
        function extraerCampo(texto, campo) {
            const regex = new RegExp(`${campo}:\\s*(.*)`, "i");
            const match = texto.match(regex);
            return match ? match[1].trim() : "";
        }

        function initSwiper() {
            new Swiper('.swiper', {
                direction: 'vertical',
                slidesPerView: 1,
                mousewheel: true,
                resistanceRatio: 0.4,
            });
        }

        cargarContenido();
    </script>
</body>
</html>
